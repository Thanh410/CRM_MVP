databases:
  - name: crm-db
    plan: free
    databaseName: crm_db
    user: crm_user
    ipAllowList: []

services:
  - type: web
    plan: free
    name: crm-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: "15m"
      - key: JWT_REFRESH_EXPIRES
        value: "7d"
      - key: FRONTEND_URL
        value: "https://crm-web-blue.vercel.app"
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "100"
      - key: LOG_LEVEL
        value: "info"
      - key: LOG_PRETTY
        value: "false"
    healthCheckPath: /api/health
